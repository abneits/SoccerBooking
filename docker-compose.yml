services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soccerbooking
      POSTGRES_USER: soccer
      POSTGRES_PASSWORD: soccer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soccer -d soccerbooking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
