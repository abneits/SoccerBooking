{% extends "base.html" %}
{% block content %}
<main class="auth-page">
  <h1>Play Arena</h1>
  <h2>Connexion</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input name="username" placeholder="Nom d'utilisateur" autocomplete="username" required>
    <input name="pin" type="password" placeholder="PIN (4 chiffres)" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
  </form>
  <p><a href="/register">Créer un compte</a></p>
</main>
{% endblock %}
