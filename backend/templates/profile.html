{% extends "base.html" %}
{% block content %}
<main class="auth-page">
  <header class="page-header" style="margin-bottom:1.5rem">
    <h1>Profile</h1>
    <nav><a href="/">← Home</a></nav>
  </header>

  <p>Logged in as <strong>{{ user.username }}</strong>
  {% if user.role == "admin" %}<span class="role-badge">admin</span>{% endif %}
  </p>

  <h2>Change PIN</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  {% if success %}<p class="success">{{ success }}</p>{% endif %}

  <form method="post" action="/profile/pin">
    <input type="password" name="current_pin" placeholder="Current PIN" maxlength="4" inputmode="numeric" autocomplete="current-password" required>
    <input type="password" name="new_pin" placeholder="New PIN (4 digits)" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="new-password" required>
    <input type="password" name="confirm_pin" placeholder="Confirm new PIN" maxlength="4" inputmode="numeric" autocomplete="new-password" required>
    <button type="submit">Update PIN</button>
  </form>
</main>
{% endblock %}
