{% extends "base.html" %}
{% block content %}
<main class="auth-page">
  <header class="page-header" style="margin-bottom:1.5rem">
    <h1>Profil</h1>
    <nav><a href="/">← Accueil</a></nav>
  </header>

  <p>Connecté en tant que <strong>{{ user.username }}</strong>
  {% if user.role == "admin" %}<span class="role-badge">admin</span>{% endif %}
  </p>

  <h2>Changer le PIN</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  {% if success %}<p class="success">{{ success }}</p>{% endif %}

  <form method="post" action="/profile/pin">
    <input type="password" name="current_pin" placeholder="PIN actuel" maxlength="4" inputmode="numeric" autocomplete="current-password" required>
    <input type="password" name="new_pin" placeholder="Nouveau PIN (4 chiffres)" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="new-password" required>
    <input type="password" name="confirm_pin" placeholder="Confirmer le nouveau PIN" maxlength="4" inputmode="numeric" autocomplete="new-password" required>
    <button type="submit">Mettre à jour le PIN</button>
  </form>
</main>
{% endblock %}
