{% extends "base.html" %}
{% block content %}
<main class="auth-page">
  <h1>Play Arena</h1>
  <h2>Inscription</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/register">
    <input name="username" placeholder="Nom d'utilisateur" autocomplete="username" required>
    <input name="pin" type="password" placeholder="PIN (4 chiffres)" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="new-password" required>
    <button type="submit">S'inscrire</button>
  </form>
  <p><a href="/login">Déjà un compte ?</a></p>
</main>
{% endblock %}
